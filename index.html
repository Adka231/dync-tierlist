<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MCTIERS - Professional Leaderboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    <style>
        body { background-color: #090e1a; font-family: 'Inter', sans-serif; color: #f8fafc; -webkit-tap-highlight-color: transparent; }
        .font-heavy { font-weight: 900; font-style: italic; text-transform: uppercase; letter-spacing: -0.05em; }
        
        /* Tier Design */
        .tier-circle { width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; background: #0f172a; border: 2px solid #1e293b; flex-shrink: 0; position: relative; transition: 0.3s; }
        .tier-tag { font-size: 10px; font-weight: 900; padding: 2px 6px; border-radius: 4px; margin-top: -12px; z-index: 10; border: 1px solid rgba(0,0,0,0.5); }
        
        /* Tier Colors */
        .t-1 { border-color: #fbbf24; color: #fbbf24; } .bg-t-1 { background-color: #fbbf24; color: #000; }
        .t-2 { border-color: #cbd5e1; color: #cbd5e1; } .bg-t-2 { background-color: #cbd5e1; color: #000; }
        .t-3 { border-color: #f97316; color: #f97316; } .bg-t-3 { background-color: #f97316; color: #fff; }
        .t-4 { border-color: #78716c; color: #a8a29e; } .bg-t-4 { background-color: #78716c; color: #fff; }
        .t-5 { border-color: #334155; color: #94a3b8; } .bg-t-5 { background-color: #334155; color: #fff; }

        /* Card Styling */
        .mctiers-card { background: #111827; border: 1px solid #1f2937; border-radius: 12px; transition: 0.2s; cursor: pointer; }
        .mctiers-card:hover { border-color: #3b82f6; background: #161e2e; transform: translateY(-2px); }
        .glow-1 { border-color: rgba(251, 191, 36, 0.4); box-shadow: 0 0 25px rgba(251, 191, 36, 0.1); }

        /* Modal / Profile Layout */
        #modalOverlay { display: none; position: fixed; inset: 0; background: rgba(5, 8, 18, 0.97); z-index: 100; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(12px); }
        .modal-box { background: #0f172a; border: 1px solid #1e293b; width: 100%; max-width: 400px; border-radius: 32px; padding: 30px; position: relative; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="p-6">

    <div class="max-w-md mx-auto">
        <header class="text-center mb-12">
            <h1 class="text-4xl font-heavy text-blue-500">MCTIERS</h1>
            <p class="text-gray-500 text-[10px] font-bold tracking-[0.4em] mt-1 uppercase">Combat Leaderboard</p>
        </header>

        <div id="playerList" class="space-y-4"></div>
    </div>

    <div id="modalOverlay" onclick="closeModal()">
        <div class="modal-box shadow-2xl" onclick="event.stopPropagation()">
            <button onclick="closeModal()" class="absolute top-6 right-8 text-gray-500 text-3xl font-light hover:text-white">&times;</button>
            <div id="modalContent"></div>
        </div>
    </div>

    <script>
        const titles = { 1: "Combat Grandmaster", 2: "Combat Master", 3: "Combat Ace", 4: "Combat Cadet", 5: "Combat Novice" };
        const pointMap = { 'HT1': 60, 'LT1': 55, 'HT2': 45, 'LT2': 40, 'HT3': 35, 'LT3': 25, 'HT4': 15, 'LT4': 10, 'HT5': 5, 'LT5': 2 };

        // Ikon Anti-Error (Sesuai List Kamu)
        const SVG = {
            sword: `<svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M18.5 2L14.5 6L15.5 7L18.5 4L20 5.5L17 8.5L18 9.5L22 5.5L18.5 2Z" fill="#38BDF8"/><path d="M14 7L3 18L6 21L17 10L14 7Z" fill="#0EA5E9"/></svg>`,
            mace: `<svg width="24" height="24" viewBox="0 0 24 24" fill="none"><rect x="7" y="3" width="10" height="10" rx="2" fill="#94A3B8"/><path d="M12 13V21" stroke="#64748B" stroke-width="3"/></svg>`,
            crystal: `<svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M12 2L4 8L12 14L20 8L12 2Z" fill="#C084FC"/><path d="M4 16L12 22L20 16L12 10L4 16Z" fill="#A855F7"/></svg>`,
            axe: `<svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M7 4H14L17 7V11L14 14H7V4Z" fill="#38BDF8"/><path d="M10 14V21" stroke="#78350f" stroke-width="2"/></svg>`,
            smp: `<svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M12 22C12 22 20 18 20 12V5L12 2L4 5V12C4 18 12 22 12 22Z" fill="#10B981"/></svg>`,
            nethpot: `<svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M5 10C5 6 8 3 12 3C16 3 19 6 19 10V18C19 20 17 21 15 21H9C7 21 5 20 5 18V10Z" fill="#475569"/></svg>`,
            diapot: `<svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M5 10C5 6 8 3 12 3C16 3 19 6 19 10V18C19 20 17 21 15 21H9C7 21 5 20 5 18V10Z" fill="#0EA5E9"/></svg>`,
            uhc: `<svg width="24" height="24" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="13" r="8" fill="#FBBF24"/><path d="M12 5V2" stroke="#4ADE80" stroke-width="2"/></svg>`
        };

        const players = [
            { name: "ItzRealMe", rank: 1, tiers: { sword: "HT3", mace: "HT1", crystal: "HT1", axe: "HT1", smp: "HT1", nethpot: "HT1", diapot: "HT1", uhc: "HT1" } },
            { name: "coldified", rank: 2, tiers: { sword: "LT1", crystal: "HT2", mace: "LT1", nethpot: "LT2" } },
            { name: "Swight", rank: 3, tiers: { sword: "HT1", uhc: "LT2", axe: "LT3" } },
            { name: "janekv", rank: 4, tiers: { sword: "HT2", mace: "HT3" } },
            { name: "Kylaz", rank: 5, tiers: { smp: "LT1", uhc: "LT2" } }
        ];

        function getStyle(t) { const n = t.replace(/\D/g, ''); return { c: `t-${n}`, b: `bg-t-${n}` }; }
        function getPoints(ts) { return Object.values(ts).reduce((s, t) => s + (pointMap[t] || 0), 0); }

        function render() {
            const list = document.getElementById('playerList');
            players.forEach(p => {
                const total = getPoints(p.tiers);
                const card = document.createElement('div');
                card.className = `mctiers-card p-5 ${p.rank==1?'glow-1':''}`;
                card.onclick = () => openProfile(p);
                
                card.innerHTML = `
                    <div class="flex items-center justify-between mb-4">
                        <div class="flex items-center gap-4">
                            <span class="text-xl font-heavy text-gray-700">#${p.rank}</span>
                            <img src="https://minotar.net/helm/${p.name}/40.png" class="rounded shadow-sm">
                            <div>
                                <h3 class="font-bold text-lg leading-tight truncate max-w-[140px]">${p.name}</h3>
                                <div class="text-blue-500 text-[9px] font-black uppercase italic">${titles[p.rank]}</div>
                            </div>
                        </div>
                        <div class="text-right">
                            <div class="text-xl font-heavy text-white">${total}</div>
                            <div class="text-[8px] text-gray-500 font-bold">POINTS</div>
                        </div>
                    </div>
                    <div class="flex gap-2.5 overflow-x-auto no-scrollbar">
                        ${Object.entries(p.tiers).map(([m, t]) => {
                            const s = getStyle(t);
                            return `<div class="flex flex-col items-center">
                                <div class="tier-circle ${s.c} scale-90">${SVG[m]}</div>
                                <span class="tier-tag ${s.b}">${t}</span>
                            </div>`;
                        }).join('')}
                    </div>
                `;
                list.appendChild(card);
            });
        }

        function openProfile(p) {
            const body = document.getElementById('modalContent');
            const total = getPoints(p.tiers);
            body.innerHTML = `
                <div class="flex items-center gap-2 text-[10px] font-bold text-gray-500 mb-6 uppercase tracking-wider">
                    <span class="hover:text-blue-500 cursor-pointer">Leaderboard</span>
                    <span class="text-gray-700">/</span>
                    <span class="text-gray-300">${p.name}</span>
                </div>
                
                <div class="text-center">
                    <img src="${p.customImg || 'https://minotar.net/armor/body/'+p.name+'/120.png'}" class="mx-auto mb-6 drop-shadow-2xl">
                    <h2 class="text-4xl font-heavy italic uppercase mb-1">${p.name}</h2>
                    <div class="flex justify-center gap-2 mb-8">
                        <div class="bg-blue-600/10 text-blue-400 text-[10px] font-bold px-3 py-1 rounded-full border border-blue-500/20">⚔ ${titles[p.rank]}</div>
                        <div class="bg-white/5 text-gray-400 text-[10px] font-bold px-3 py-1 rounded-full border border-white/10">🌎 North America</div>
                    </div>

                    <div class="text-left mb-8">
                        <h4 class="text-gray-500 text-[9px] font-black tracking-widest mb-3 uppercase">POSITION</h4>
                        <div class="bg-gray-800/30 p-4 rounded-2xl flex items-center justify-between border border-white/5">
                            <div class="flex items-center gap-3">
                                <div class="bg-blue-600 text-[10px] font-black px-2 py-0.5 rounded italic">#${p.rank}</div>
                                <span class="text-xs font-bold uppercase italic text-gray-300">Overall Rank</span>
                            </div>
                            <span class="text-sm font-heavy text-blue-400">${total} <span class="text-[10px] text-gray-500 italic">pts</span></span>
                        </div>
                    </div>

                    <div class="text-left">
                        <h4 class="text-gray-500 text-[9px] font-black tracking-widest mb-3 uppercase">GAMEMODE TIERS</h4>
                        <div class="flex gap-3 overflow-x-auto no-scrollbar pb-2 px-1 -mx-1">
                            ${Object.entries(p.tiers).map(([m, t]) => {
                                const s = getStyle(t);
                                return `<div class="bg-white/5 p-4 rounded-2xl flex flex-col items-center min-w-[75px] border border-white/5">
                                    <div class="tier-circle !w-10 !h-10 ${s.c} mb-3">${SVG[m]}</div>
                                    <span class="text-[10px] font-heavy ${s.c}">${t}</span>
                                    <span class="text-[8px] text-gray-600 font-bold uppercase mt-1 tracking-tighter">${m}</span>
                                </div>`;
                            }).join('')}
                        </div>
                    </div>
                </div>
            `;
            document.getElementById('modalOverlay').style.display = 'flex';
        }

        function closeModal() { document.getElementById('modalOverlay').style.display = 'none'; }
        render();
    </script>
</body>
</html>
