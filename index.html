<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DyncTiers - Rankings</title>
    <!-- Importing the clean fonts used by mctiers style sheets -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Header containing your custom branding -->
    <header class="site-header">
        <div class="logo-wrap">
            <!-- References your repository image 'Dync Tiers Logo.png' directly -->
            <img src="Dync Tiers Logo.png" alt="Dync Tier Logo" onerror="this.alt='Dync Tier'">
        </div>
        <button class="others-btn" onclick="openOthersModal()">
            <span>Info Matrix</span>
        </button>
    </header>

    <!-- Navigation tier category tab bar -->
    <nav class="tab-bar">
        <button class="tab-item active" onclick="filterBy('overall', this)">
            <span class="tab-emoji">🏆</span>
            <span>Overall</span>
        </button>
        <button class="tab-item" onclick="filterBy('sword', this)">
            <img src="Sword.png" alt="Sword">
            <span>Sword</span>
        </button>
        <button class="tab-item" onclick="filterBy('crystal', this)">
            <img src="Crystal.png" alt="Crystal">
            <span>Crystal</span>
        </button>
        <button class="tab-item" onclick="filterBy('mace', this)">
            <img src="Mace.png" alt="Mace">
            <span>Mace</span>
        </button>
        <button class="tab-item" onclick="filterBy('smp', this)">
            <img src="SMP.png" alt="SMP">
            <span>SMP</span>
        </button>
        <button class="tab-item" onclick="filterBy('diapot', this)">
            <img src="Diapot.png" alt="Diapot">
            <span>Diapot</span>
        </button>
        <button class="tab-item" onclick="filterBy('nethpot', this)">
            <img src="NethOp.png" alt="Nethpot">
            <span>Nethpot</span>
        </button>
        <button class="tab-item" onclick="filterBy('axe', this)">
            <img src="Axe.png" alt="Axe">
            <span>Axe</span>
        </button>
        <button class="tab-item" onclick="filterBy('uhc', this)">
            <img src="UHC.png" alt="UHC">
            <span>UHC</span>
        </button>
    </nav>

    <!-- Content column layout hints -->
    <div class="col-header">
        <span>Rank</span>
        <span>Player</span>
        <span>Region</span>
    </div>

    <!-- Main dynamic player cards platform feed container -->
    <main id="playerContainer"></main>

    <!-- Profile Detail Bottom Sheet Modal View Component -->
    <div id="profileModal" class="universal-modal" onclick="if(event.target===this) closeProfile()">
        <div class="modal-box" id="modalBody"></div>
    </div>

    <!-- Info/Points Ledger Dialog View Modal Component -->
    <div id="othersModal" class="universal-modal" onclick="if(event.target===this) closeOthersModal()">
        <div class="modal-box">
            <div style="padding:20px 20px 12px; display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid #21262d;">
                <h3 style="font-size:1.1rem; font-weight:800; color:#e6edf3;">Tier Point Values</h3>
                <button onclick="closeOthersModal()" style="width:32px; height:32px; background:#21262d; border:1px solid #30363d; border-radius:50%; color:#8b949e; cursor:pointer;">✕</button>
            </div>
            <div id="ledgerContainer" style="padding:20px; display:flex; flex-direction:column; gap:8px;"></div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
