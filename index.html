<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>DyncTiers – Ranked Players</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#0d1117;font-family:'Inter',sans-serif;color:#e6edf3;overflow-x:hidden;padding-bottom:80px;-webkit-font-smoothing:antialiased}

/* HEADER */
.site-header{display:flex;align-items:center;justify-content:space-between;padding:16px 16px 0;max-width:900px;margin:0 auto}
.logo-wrap img{height:52px;object-fit:contain}
.logo-wrap .logo-broken{font-size:1.6rem;font-weight:900;color:#e6edf3;letter-spacing:-0.03em}
.others-btn{display:flex;align-items:center;gap:8px;background:#161b22;border:1px solid #30363d;color:#8b949e;border-radius:10px;padding:9px 16px;font-size:0.75rem;font-weight:700;letter-spacing:0.04em;text-transform:uppercase;cursor:pointer;transition:all .2s ease}
.others-btn:hover{background:#21262d;border-color:#58a6ff;color:#58a6ff}

/* TAB BAR */
.tab-bar{display:flex;gap:0;overflow-x:auto;padding:14px 12px 0;max-width:900px;margin:0 auto;scrollbar-width:none;border-bottom:1px solid #21262d}
.tab-bar::-webkit-scrollbar{display:none}
.tab-item{display:flex;flex-direction:column;align-items:center;gap:6px;padding:10px 14px 12px;font-size:0.75rem;font-weight:600;cursor:pointer;white-space:nowrap;flex-shrink:0;color:#8b949e;border-bottom:2px solid transparent;transition:all .2s ease;position:relative;background:transparent;margin-bottom:-1px}
.tab-item img{width:26px;height:26px;object-fit:contain;filter:grayscale(60%) brightness(0.6);transition:all .2s ease}
.tab-item:hover{color:#e6edf3}
.tab-item:hover img{filter:grayscale(0%) brightness(1)}
.tab-item.active{color:#e6edf3;border-bottom-color:#f0a500;font-weight:700}
.tab-item.active img{filter:grayscale(0%) brightness(1)}
.tab-emoji{font-size:1.3rem;line-height:1}

/* COLUMN HEADERS */
.col-header{display:grid;grid-template-columns:48px 1fr auto;gap:12px;padding:10px 16px 6px;max-width:900px;margin:0 auto;font-size:0.62rem;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:#484f58}

/* PLAYER CARDS */
#playerContainer{max-width:900px;margin:0 auto;padding:0 12px;display:flex;flex-direction:column;gap:8px}
.mc-card{background:#161b22;border:1px solid #21262d;border-radius:14px;overflow:hidden;cursor:pointer;transition:border-color .2s ease,transform .2s ease;animation:cardIn .4s ease both}
.mc-card:hover{border-color:#388bfd;transform:translateY(-1px)}
@keyframes cardIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* CARD BANNER */
.card-banner{display:flex;align-items:stretch;position:relative;min-height:72px}
.card-left{display:flex;align-items:stretch;flex-shrink:0;position:relative;overflow:hidden}
.rank-num{font-weight:900;font-size:2rem;color:#fff;opacity:.9;padding:0 10px 0 14px;display:flex;align-items:center;text-shadow:0 2px 4px rgba(0,0,0,.5);z-index:2;position:relative;min-width:60px}
.rank-avatar{width:72px;height:72px;object-fit:cover;display:block;flex-shrink:0}
/* colored left block per rank */
.top1 .card-left{background:linear-gradient(105deg,#c9930a 0%,#7a5500 65%,#161b22 100%)}
.top2 .card-left{background:linear-gradient(105deg,#4a4a55 0%,#2a2a2a 65%,#161b22 100%)}
.top3 .card-left{background:linear-gradient(105deg,#8b5a1a 0%,#4a3000 65%,#161b22 100%)}

.card-info{flex:1;padding:14px 12px;min-width:0;display:flex;flex-direction:column;justify-content:center}
.card-name{font-size:1.05rem;font-weight:800;color:#e6edf3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:-0.01em}
.card-sub{display:flex;align-items:center;gap:5px;margin-top:3px}
.card-sub-icon{color:#f0a500;font-size:0.8rem}
.card-sub-text{font-size:0.72rem;color:#8b949e;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.region-badge{flex-shrink:0;padding:5px 10px;border-radius:8px;font-size:0.7rem;font-weight:800;margin-right:14px;align-self:center;color:#fff}
.r-AS,.r-NA{background:#6b1a1a}.r-EU{background:#1a5e2a}.r-SEA{background:#1a3a6b}.r-OC{background:#4a1a6b}

/* TIERS SECTION */
.card-tiers{padding:10px 14px 14px;border-top:1px solid #21262d}
.tiers-lbl{font-size:0.6rem;font-weight:800;letter-spacing:0.14em;text-transform:uppercase;color:#484f58;margin-bottom:8px}
.tiers-row{display:flex;flex-wrap:wrap;gap:8px}

/* TIER CAPSULE */
.tier-cap{display:flex;flex-direction:column;align-items:center;gap:0;animation:capIn .35s cubic-bezier(.34,1.56,.64,1) both}
@keyframes capIn{from{opacity:0;transform:scale(.7)}to{opacity:1;transform:scale(1)}}
.tier-ring{width:44px;height:44px;border-radius:50%;background:#0d1117;border:2px solid #30363d;display:flex;align-items:center;justify-content:center;overflow:hidden;transition:transform .2s ease}
.tier-cap:hover .tier-ring{transform:scale(1.1)}
.tier-ring img{width:26px;height:26px;object-fit:contain}
.tier-lbl{font-size:0.68rem;font-weight:800;margin-top:4px}
/* tier colors */
.t1 .tier-ring{border-color:#c9930a}.t1 .tier-lbl{color:#c9930a}
.t2 .tier-ring{border-color:#484f58}.t2 .tier-lbl{color:#8b949e}
.t3 .tier-ring{border-color:#30363d}.t3 .tier-lbl{color:#8b949e}
.t4 .tier-ring{border-color:#21262d}.t4 .tier-lbl{color:#484f58}
.t5 .tier-ring{border-color:#21262d}.t5 .tier-lbl{color:#30363d}

/* MODAL */
.modal-wrap{display:none;position:fixed;inset:0;z-index:200;align-items:flex-end;justify-content:center;background:rgba(0,0,0,0);transition:background .3s ease}
.modal-wrap.open{background:rgba(0,0,0,.75)}
.modal-box{background:#0d1117;border:1px solid #21262d;border-radius:24px 24px 0 0;width:100%;max-width:480px;opacity:0;transform:translateY(60px);transition:transform .4s cubic-bezier(.34,1.2,.64,1),opacity .3s ease;overflow:hidden;max-height:92vh;overflow-y:auto;scrollbar-width:none}
.modal-box::-webkit-scrollbar{display:none}
.modal-wrap.open .modal-box{opacity:1;transform:translateY(0)}
#othersModal{align-items:center;padding:16px}
#othersModal .modal-box{border-radius:20px;max-width:400px;max-height:80vh}

/* PROFILE AVATAR */
.modal-ava{width:96px;height:96px;border-radius:50%;object-fit:cover;border:3px solid #30363d}
.ava-gold{border-color:#f0a500}.ava-silver{border-color:#8b949e}.ava-bronze{border-color:#cd7f32}

/* POSITION BANNER */
.pos-row{display:flex;align-items:stretch;border-radius:10px;overflow:hidden;border:1px solid #21262d}
.pos-num{padding:12px 18px;font-size:1.4rem;font-weight:900;color:#fff;flex-shrink:0}
.pos-gold{background:#c9930a}.pos-silver{background:#4a4a55}.pos-bronze{background:#8b5a1a}.pos-other{background:#21262d;color:#8b949e}
.pos-info{display:flex;align-items:center;gap:8px;padding:0 16px;font-size:0.85rem;font-weight:800;color:#e6edf3;letter-spacing:0.04em}
.pos-pts{font-size:0.75rem;color:#8b949e;font-weight:500}

.sec-lbl{font-size:1rem;font-weight:800;color:#8b949e;letter-spacing:0.05em;text-transform:uppercase;margin-bottom:12px}
</style>
</head>
<body>

<!-- HEADER -->
<header class="site-header">
  <div class="logo-wrap">
    <img src="Dync_Tiers_Logo.png" alt="DyncTiers" onerror="this.style.display='none';this.nextElementSibling.style.display='block'">
    <span class="logo-broken" style="display:none">DYNCTIERS</span>
  </div>
  <button class="others-btn" onclick="openOthers()">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
    Others
    <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"><polyline points="6 9 12 15 18 9"/></svg>
  </button>
</header>

<!-- TABS -->
<nav class="tab-bar">
  <div class="tab-item active" onclick="filterBy('overall',this)"><span class="tab-emoji">🏆</span><span>Overall</span></div>
  <div class="tab-item" onclick="filterBy('sword',this)"><img src="Sword.png" alt=""><span>Sword</span></div>
  <div class="tab-item" onclick="filterBy('crystal',this)"><img src="Crystal.png" alt=""><span>Crystal</span></div>
  <div class="tab-item" onclick="filterBy('mace',this)"><img src="Mace.png" alt=""><span>Mace</span></div>
  <div class="tab-item" onclick="filterBy('smp',this)"><img src="SMP.png" alt=""><span>SMP</span></div>
  <div class="tab-item" onclick="filterBy('diapot',this)"><img src="Diapot.png" alt=""><span>Diapot</span></div>
  <div class="tab-item" onclick="filterBy('nethpot',this)"><img src="NethOp.png" alt=""><span>Nethpot</span></div>
  <div class="tab-item" onclick="filterBy('axe',this)"><img src="Axe.png" alt=""><span>Axe</span></div>
  <div class="tab-item" onclick="filterBy('uhc',this)"><img src="UHC.png" alt=""><span>UHC</span></div>
</nav>

<!-- COL HEADERS -->
<div class="col-header"><span>#</span><span>PLAYER</span><span>REGION</span></div>

<!-- LIST -->
<div id="playerContainer"></div>

<!-- OTHERS MODAL -->
<div id="othersModal" class="modal-wrap" onclick="closeOthers()">
  <div class="modal-box" onclick="event.stopPropagation()">
    <div style="padding:18px 20px 14px;border-bottom:1px solid #21262d;display:flex;justify-content:space-between;align-items:center">
      <div>
        <div style="font-size:1rem;font-weight:900;color:#e6edf3">Tier Point Ledger</div>
        <div style="font-size:0.62rem;color:#58a6ff;font-weight:700;text-transform:uppercase;letter-spacing:.1em;margin-top:2px">Point system</div>
      </div>
      <button onclick="closeOthers()" style="width:32px;height:32px;background:#21262d;border:1px solid #30363d;border-radius:8px;color:#8b949e;cursor:pointer;font-size:.9rem;display:flex;align-items:center;justify-content:center">✕</button>
    </div>
    <div style="padding:16px 20px;max-height:55vh;overflow-y:auto;scrollbar-width:none">
      <div id="ledger" style="display:grid;grid-template-columns:1fr 1fr;gap:8px"></div>
    </div>
    <div style="padding:0 20px 20px">
      <button onclick="closeOthers()" style="width:100%;padding:12px;background:#21262d;border:1px solid #30363d;border-radius:10px;font-size:.75rem;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:#8b949e;cursor:pointer">Dismiss</button>
    </div>
  </div>
</div>

<!-- PROFILE MODAL -->
<div id="profileModal" class="modal-wrap" onclick="closeProfile()">
  <div class="modal-box" onclick="event.stopPropagation()">
    <div id="profileBody"></div>
  </div>
</div>

<script>
var filter = 'overall';

var PTS = {'HT1':65,'LT1':50,'HT2':40,'LT2':35,'HT3':20,'LT3':15,'HT4':10,'LT4':5,'HT5':3,'LT5':1};

var ICONS = {sword:'Sword.png',crystal:'Crystal.png',mace:'Mace.png',smp:'SMP.png',diapot:'Diapot.png',nethpot:'NethOp.png',axe:'Axe.png',uhc:'UHC.png'};
var NAMES = {sword:'Sword',crystal:'Crystal',mace:'Mace',smp:'SMP',diapot:'Diapot',nethpot:'Nethpot',axe:'Axe',uhc:'UHC'};

var PLAYERS = [
  {id:1,name:'X1an_',title:'Combat Grandmaster',region:'Asia',
   pfp:'https://i.postimg.cc/zfhd3dML/custom-ava-(6).png',
   tiers:{sword:'LT1',crystal:'LT3',mace:'HT4',smp:'LT2',diapot:'LT2',nethpot:'HT4',axe:'LT3',uhc:'LT3'}},
  {id:2,name:'ugood',title:'Average Pros',region:'Asia',
   pfp:'https://i.postimg.cc/02qqHcHW/custom-ava-(10).png',
   tiers:{sword:'HT3',smp:'LT3',mace:'LT3'}},
  {id:3,name:'aozora',title:'Sword Carried',region:'Asia',
   pfp:'https://i.postimg.cc/mrnwppVs/custom-ava-(8).png',
   tiers:{sword:'LT4'}},
  {id:4,name:'Nelllwkwkwk',title:'Top 1 Wannabe',region:'Asia',
   pfp:'https://i.postimg.cc/bJzzMLv1/custom-ava-(9).png',
   tiers:{sword:'HT5',uhc:'LT5'}},
  {id:5,name:'owllyarv',title:'Mace Specialist',region:'Asia',
   pfp:'https://i.postimg.cc/fT79Sq90/custom-ava-(7).png',
   tiers:{crystal:'HT5',mace:'LT4',sword:'HT5'}},
  {id:6,name:'none',title:'Survival Pro',region:'North America',pfp:'',tiers:{smp:'LT5'}},
  {id:7,name:'none',title:'Rising Star',region:'South East Asia',pfp:'',tiers:{sword:'LT5'}}
];

function pts(tiers){var t=0;for(var k in tiers)t+=(PTS[tiers[k]]||0);return t;}

function rBadge(region){
  if(!region)return{cls:'r-AS',lbl:'AS'};
  var r=region.toLowerCase();
  if(r.indexOf('europe')!==-1||r==='eu')return{cls:'r-EU',lbl:'EU'};
  if(r.indexOf('north america')!==-1||r==='na')return{cls:'r-NA',lbl:'NA'};
  if(r.indexOf('south east')!==-1||r==='sea')return{cls:'r-SEA',lbl:'SEA'};
  if(r.indexOf('oceania')!==-1||r==='oc')return{cls:'r-OC',lbl:'OC'};
  return{cls:'r-AS',lbl:'AS'};
}

function imgErr(img){
  img.onerror=null;
  img.src='https://api.dicebear.com/7.x/identicon/svg?seed='+encodeURIComponent(img.dataset.n||'x')+'&backgroundType=solid&backgroundColor=161b22';
}

function capHtml(mode,tier,delay){
  var lv=tier.replace(/\D/g,'');
  var ic=ICONS[mode]||'';
  var inner=ic?'<img src="'+ic+'" alt="'+mode+'" onerror="this.style.display=\'none\'">':'';
  return '<div class="tier-cap t'+lv+'" style="animation-delay:'+delay+'ms">'
        +'<div class="tier-ring">'+inner+'</div>'
        +'<div class="tier-lbl">'+tier+'</div>'
        +'</div>';
}

function buildLedger(){
  var el=document.getElementById('ledger');if(!el)return;
  var h='';
  for(var tier in PTS){
    var lv=tier.replace(/\D/g,'');
    h+='<div style="background:#161b22;border:1px solid #21262d;padding:10px 14px;border-radius:10px;display:flex;align-items:center;justify-content:space-between">'
      +'<span class="tier-lbl t'+lv+'" style="font-size:.75rem;padding:4px 10px;background:#0d1117;border-radius:6px;border:1px solid #21262d">'+tier+'</span>'
      +'<span style="font-size:.8rem;font-weight:800;color:#e6edf3">'+PTS[tier]+'<span style="font-size:.62rem;color:#484f58;margin-left:3px">PTS</span></span>'
      +'</div>';
  }
  el.innerHTML=h;
}

function render(){
  var c=document.getElementById('playerContainer');if(!c)return;
  c.innerHTML='';
  for(var i=0;i<PLAYERS.length;i++)PLAYERS[i]._pts=pts(PLAYERS[i].tiers);
  PLAYERS.sort(function(a,b){return b._pts-a._pts;});
  var shown=0;
  for(var idx=0;idx<PLAYERS.length;idx++){
    var p=PLAYERS[idx];var rank=idx+1;
    var th='';
    if(filter==='overall'){
      var di=0;for(var m in p.tiers){th+=capHtml(m,p.tiers[m],di*35);di++;}
    } else {
      if(!p.tiers[filter])continue;
      th=capHtml(filter,p.tiers[filter],0);
    }
    var rb=rBadge(p.region);
    var tc=rank===1?'top1':rank===2?'top2':rank===3?'top3':'';
    var card=document.createElement('div');
    card.className='mc-card '+tc;
    card.style.animationDelay=(shown*55)+'ms';
    card.setAttribute('data-id',p.id);
    card.setAttribute('data-rank',rank);
    card.innerHTML=
      '<div class="card-banner">'
      +'<div class="card-left">'
      +'<div class="rank-num">'+rank+'.</div>'
      +'<img class="rank-avatar" src="'+(p.pfp||'')+'" data-n="'+p.name+'" onerror="imgErr(this)" alt="'+p.name+'">'
      +'</div>'
      +'<div class="card-info">'
      +'<div class="card-name">'+p.name+'</div>'
      +'<div class="card-sub"><span class="card-sub-icon">✦</span><span class="card-sub-text">'+p.title+'</span></div>'
      +'</div>'
      +'<div class="region-badge '+rb.cls+'">'+rb.lbl+'</div>'
      +'</div>'
      +'<div class="card-tiers"><div class="tiers-lbl">Tiers</div><div class="tiers-row">'+th+'</div></div>';
    card.onclick=(function(id,r){return function(){openProfile(id,r);};})(p.id,rank);
    c.appendChild(card);shown++;
  }
}

function openProfile(id,rank){
  var p=null;for(var i=0;i<PLAYERS.length;i++){if(PLAYERS[i].id===id){p=PLAYERS[i];break;}}
  if(!p)return;
  var avaCls='modal-ava'+(rank===1?' ava-gold':rank===2?' ava-silver':rank===3?' ava-bronze':'');
  var pnCls=rank===1?'pos-gold':rank===2?'pos-silver':rank===3?'pos-bronze':'pos-other';
  var th='';var di=0;for(var m in p.tiers){th+=capHtml(m,p.tiers[m],di*35);di++;}
  var html=
    '<div style="padding:18px 18px 0;display:flex;justify-content:flex-end">'
    +'<button onclick="closeProfile()" style="width:36px;height:36px;background:#21262d;border:1px solid #30363d;border-radius:50%;color:#8b949e;cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center">✕</button>'
    +'</div>'
    +'<div style="text-align:center;padding:0 20px 18px">'
    +'<img class="'+avaCls+'" src="'+(p.pfp||'')+'" data-n="'+p.name+'" onerror="imgErr(this)" alt="'+p.name+'">'
    +'<h2 style="font-size:1.5rem;font-weight:900;color:#e6edf3;margin-top:12px;letter-spacing:-.02em">'+p.name+'</h2>'
    +'<div style="display:inline-flex;align-items:center;gap:6px;background:#21262d;border:1px solid #30363d;border-radius:20px;padding:6px 16px;margin-top:8px">'
    +'<span style="color:#f0a500">✦</span><span style="font-size:.8rem;font-weight:700;color:#f0a500">'+p.title+'</span>'
    +'</div>'
    +'<div style="font-size:.85rem;color:#484f58;font-weight:600;margin-top:8px">'+p.region+'</div>'
    +'</div>'
    +'<div style="padding:0 20px 18px">'
    +'<div class="sec-lbl">Position</div>'
    +'<div class="pos-row">'
    +'<div class="pos-num '+pnCls+'">'+rank+'.</div>'
    +'<div class="pos-info">🏆 OVERALL <span class="pos-pts">('+p._pts+' points)</span></div>'
    +'</div>'
    +'</div>'
    +'<div style="padding:0 20px 32px">'
    +'<div class="sec-lbl">Tiers</div>'
    +'<div style="background:#161b22;border:1px solid #21262d;border-radius:12px;padding:14px">'
    +'<div style="display:flex;flex-wrap:wrap;gap:10px">'+th+'</div>'
    +'</div>'
    +'</div>';
  document.getElementById('profileBody').innerHTML=html;
  var modal=document.getElementById('profileModal');
  modal.style.display='flex';
  requestAnimationFrame(function(){modal.classList.add('open');});
}

function closeProfile(){
  var m=document.getElementById('profileModal');
  m.classList.remove('open');
  setTimeout(function(){m.style.display='none';},400);
}

function openOthers(){
  var m=document.getElementById('othersModal');
  m.style.display='flex';
  requestAnimationFrame(function(){m.classList.add('open');});
}

function closeOthers(){
  var m=document.getElementById('othersModal');
  m.classList.remove('open');
  setTimeout(function(){m.style.display='none';},400);
}

function filterBy(mode,el){
  filter=mode;
  var tabs=document.querySelectorAll('.tab-item');
  for(var i=0;i<tabs.length;i++)tabs[i].classList.remove('active');
  el.classList.add('active');
  render();
}

buildLedger();
render();
</script>
</body>
</html>
