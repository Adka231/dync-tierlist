<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DyncTiers – Ranked Players</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- HEADER -->
<header class="site-header">
    <div class="logo-wrap">
        <img src="Dync_Tiers_Logo.png" alt="DyncTiers">
    </div>
    <button class="others-btn" onclick="openOthersModal()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        Others
        <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"><polyline points="6 9 12 15 18 9"/></svg>
    </button>
</header>

<!-- TAB BAR -->
<nav class="tab-bar">
    <div class="tab-item active" onclick="filterBy('overall',this)">
        <span class="tab-emoji">🏆</span>
        <span>Overall</span>
    </div>
    <div class="tab-item" onclick="filterBy('sword',this)">
        <img src="Sword.png" alt="Sword">
        <span>Sword</span>
    </div>
    <div class="tab-item" onclick="filterBy('crystal',this)">
        <img src="Crystal.png" alt="Crystal">
        <span>Crystal</span>
    </div>
    <div class="tab-item" onclick="filterBy('mace',this)">
        <img src="Mace.png" alt="Mace">
        <span>Mace</span>
    </div>
    <div class="tab-item" onclick="filterBy('smp',this)">
        <img src="SMP.png" alt="SMP">
        <span>SMP</span>
    </div>
    <div class="tab-item" onclick="filterBy('diapot',this)">
        <img src="Diapot.png" alt="Diapot">
        <span>Diapot</span>
    </div>
    <div class="tab-item" onclick="filterBy('nethpot',this)">
        <img src="NethOp.png" alt="Nethpot">
        <span>Nethpot</span>
    </div>
    <div class="tab-item" onclick="filterBy('axe',this)">
        <img src="Axe.png" alt="Axe">
        <span>Axe</span>
    </div>
    <div class="tab-item" onclick="filterBy('uhc',this)">
        <img src="UHC.png" alt="UHC">
        <span>UHC</span>
    </div>
</nav>

<!-- COLUMN HEADERS -->
<div class="col-header">
    <span>#</span>
    <span>PLAYER</span>
    <span>REGION</span>
</div>

<!-- LEADERBOARD -->
<div id="playerContainer"></div>

<!-- OTHERS MODAL -->
<div id="othersModal" class="universal-modal" onclick="closeOthersModal()">
    <div class="modal-box" onclick="event.stopPropagation()">
        <div style="padding:20px 20px 14px;border-bottom:1px solid #21262d;display:flex;justify-content:space-between;align-items:center">
            <div>
                <div style="font-size:1rem;font-weight:900;color:#e6edf3">Tier Point Ledger</div>
                <div style="font-size:0.62rem;color:#58a6ff;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;margin-top:2px">Point system</div>
            </div>
            <button onclick="closeOthersModal()" style="width:32px;height:32px;background:#21262d;border:1px solid #30363d;border-radius:8px;color:#8b949e;cursor:pointer;font-size:0.9rem;display:flex;align-items:center;justify-content:center">✕</button>
        </div>
        <div style="padding:16px 20px;max-height:60vh;overflow-y:auto;scrollbar-width:none">
            <div id="ledgerContainer" style="display:grid;grid-template-columns:1fr 1fr;gap:8px"></div>
        </div>
        <div style="padding:0 20px 20px">
            <button onclick="closeOthersModal()" style="width:100%;padding:12px;background:#21262d;border:1px solid #30363d;border-radius:10px;font-size:0.75rem;font-weight:800;text-transform:uppercase;letter-spacing:0.08em;color:#8b949e;cursor:pointer">Dismiss</button>
        </div>
    </div>
</div>

<!-- PROFILE MODAL -->
<div id="profileModal" class="universal-modal" onclick="closeProfile()">
    <div id="modalContainer" class="modal-box" onclick="event.stopPropagation()">
        <div id="modalBody"></div>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
