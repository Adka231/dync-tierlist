<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MCTIERS - Professional Clone</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    <style>
        body { background-color: #0b0f1a; font-family: 'Inter', sans-serif; color: #f8fafc; -webkit-tap-highlight-color: transparent; }
        
        /* Typography & Layout */
        .font-heavy { font-weight: 900; font-style: italic; text-transform: uppercase; letter-spacing: -0.05em; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* Card & Glows */
        .mctiers-card { background: #111827; border: 1px solid #1f2937; border-radius: 12px; transition: all 0.2s; cursor: pointer; }
        .mctiers-card:hover { background: #161e2e; border-color: #3b82f6; transform: translateY(-2px); }
        .glow-1 { border-color: rgba(251, 191, 36, 0.5); box-shadow: 0 0 20px rgba(251, 191, 36, 0.15); }
        .glow-2 { border-color: rgba(148, 163, 184, 0.4); box-shadow: 0 0 20px rgba(148, 163, 184, 0.1); }
        .glow-3 { border-color: rgba(234, 88, 12, 0.4); box-shadow: 0 0 20px rgba(234, 88, 12, 0.1); }

        /* Tier Styling */
        .tier-circle { width: 42px; height: 42px; border-radius: 50%; display: flex; align-items: center; justify-content: center; background: #0f172a; border: 2px solid #1e293b; flex-shrink: 0; }
        .tier-img { width: 26px; height: 26px; object-fit: contain; image-rendering: pixelated; }
        .tier-tag { font-size: 10px; font-weight: 900; padding: 1px 6px; border-radius: 4px; margin-top: -10px; z-index: 10; border: 1px solid rgba(0,0,0,0.4); }

        /* Tier Colors */
        .t-1 { border-color: #fbbf24; color: #fbbf24; } .bg-t-1 { background-color: #fbbf24; color: #000; }
        .t-2 { border-color: #cbd5e1; color: #cbd5e1; } .bg-t-2 { background-color: #cbd5e1; color: #000; }
        .t-3 { border-color: #f97316; color: #f97316; } .bg-t-3 { background-color: #f97316; color: #fff; }
        .t-4 { border-color: #78716c; color: #a8a29e; } .bg-t-4 { background-color: #78716c; color: #fff; }
        .t-5 { border-color: #334155; color: #94a3b8; } .bg-t-5 { background-color: #334155; color: #fff; }

        /* Profile Modal */
        #modalOverlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 100; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(10px); }
        .modal-box { background: #0f172a; border: 1px solid #1e293b; width: 100%; max-width: 400px; border-radius: 24px; padding: 28px; position: relative; }
        .stat-box { background: #161e2e; border: 1px solid #1f2937; border-radius: 12px; padding: 12px; }
    </style>
</head>
<body class="p-6">

    <div class="max-w-md mx-auto">
        <header class="text-center mb-10">
            <h1 class="text-4xl font-heavy text-blue-500 italic">MCTIERS</h1>
            <p class="text-gray-500 text-[10px] font-bold tracking-[0.3em] mt-1">THE OFFICIAL RANKINGS</p>
        </header>

        <div id="playerList" class="space-y-4"></div>
    </div>

    <div id="modalOverlay" onclick="closeModal()">
        <div class="modal-box shadow-2xl" onclick="event.stopPropagation()">
            <button onclick="closeModal()" class="absolute top-6 right-6 text-gray-500 text-3xl font-light hover:text-white">&times;</button>
            <div id="modalContent"></div>
        </div>
    </div>

    <script>
        const pointMap = { 'HT1': 60, 'LT1': 55, 'HT2': 45, 'LT2': 40, 'HT3': 35, 'LT3': 25, 'HT4': 15, 'LT4': 10, 'HT5': 5, 'LT5': 2 };
        const titles = { 1: "Combat Grandmaster", 2: "Combat Master", 3: "Combat Ace", 4: "Combat Cadet", 5: "Combat Novice" };
        
        const I = {
            sword: "https://raw.githubusercontent.com/AnisMontacer/Minecraft-Items-Icons/master/items/diamond_sword.png",
            crystal: "https://raw.githubusercontent.com/AnisMontacer/Minecraft-Items-Icons/master/items/end_crystal.png",
            mace: "https://minecraft.wiki/images/Mace_JE1_BE1.png",
            pot: "https://raw.githubusercontent.com/AnisMontacer/Minecraft-Items-Icons/master/items/potion_bottle_splash.png",
            nethpot: "https://raw.githubusercontent.com/AnisMontacer/Minecraft-Items-Icons/master/items/netherite_helmet.png",
            uhc: "https://raw.githubusercontent.com/AnisMontacer/Minecraft-Items-Icons/master/items/apple_golden.png",
            pearl: "https://raw.githubusercontent.com/AnisMontacer/Minecraft-Items-Icons/master/items/ender_pearl.png"
        };

        const players = [
            { name: "ItzRealMe", rank: 1, tiers: [
                {m:'sword', t:'HT3'}, {m:'uhc', t:'HT1'}, {m:'mace', t:'HT1'}, {m:'pot', t:'HT1'}, {m:'nethpot', t:'HT1'}, {m:'pearl', t:'HT1'}, {m:'crystal', t:'HT1'}
            ]},
            { name: "coldified", rank: 2, tiers: [
                {m:'sword', t:'LT1'}, {m:'crystal', t:'HT2'}, {m:'mace', t:'LT1'}, {m:'nethpot', t:'LT2'}, {m:'pearl', t:'LT1'}
            ]},
            { name: "Swight", rank: 3, tiers: [
                {m:'sword', t:'HT1'}, {m:'pearl', t:'LT2'}, {m:'crystal', t:'LT3'}
            ]},
            { name: "janekv", rank: 4, tiers: [
                {m:'sword', t:'HT2'}, {m:'mace', t:'HT3'}
            ]},
            { name: "Kylaz", rank: 5, tiers: [
                {m:'pearl', t:'LT1'}, {m:'uhc', t:'LT2'}
            ]}
        ];

        function getStyle(tier) { const n = tier.replace(/\D/g, ''); return { c: `t-${n}`, b: `bg-t-${n}` }; }
        function getPoints(pTiers) { return pTiers.reduce((s, t) => s + (pointMap[t.t] || 0), 0); }

        function render() {
            const list = document.getElementById('playerList');
            players.forEach(p => {
                const total = getPoints(p.tiers);
                const card = document.createElement('div');
                card.className = `mctiers-card p-5 ${p.rank==1?'glow-1':p.rank==2?'glow-2':p.rank==3?'glow-3':''}`;
                card.onclick = () => openProfile(p);
                
                card.innerHTML = `
                    <div class="flex items-center justify-between mb-4">
                        <div class="flex items-center gap-4">
                            <span class="text-xl font-heavy text-gray-700">#${p.rank}</span>
                            <img src="https://minotar.net/helm/${p.name}/40.png" class="rounded shadow-md">
                            <div>
                                <h3 class="font-bold text-lg leading-none">${p.name}</h3>
                                <span class="text-[9px] font-black text-blue-400 uppercase italic">${titles[p.rank]}</span>
                            </div>
                        </div>
                        <div class="text-right">
                            <div class="text-lg font-heavy text-gray-200">${total}</div>
                            <div class="text-[8px] text-gray-500 font-bold uppercase tracking-tighter">POINTS</div>
                        </div>
                    </div>
                    <div class="flex gap-3 overflow-x-auto no-scrollbar pb-1">
                        ${p.tiers.map(t => {
                            const s = getStyle(t.t);
                            return `<div class="flex flex-col items-center">
                                <div class="tier-circle ${s.c}"><img src="${I[t.m]}" class="tier-img"></div>
                                <span class="tier-tag ${s.b}">${t.t}</span>
                            </div>`;
                        }).join('')}
                    </div>
                `;
                list.appendChild(card);
            });
        }

        function openProfile(p) {
            const body = document.getElementById('modalContent');
            const total = getPoints(p.tiers);
            body.innerHTML = `
                <div class="text-xs text-gray-500 font-bold mb-6 flex gap-2">
                    <span class="hover:text-blue-500">Leaderboard</span>
                    <span>&gt;</span>
                    <span class="text-gray-300">${p.name}</span>
                </div>
                
                <div class="text-center">
                    <div class="relative inline-block mb-4">
                        <img src="https://minotar.net/armor/body/${p.name}/120.png" class="mx-auto drop-shadow-[0_0_15px_rgba(59,130,246,0.3)]">
                    </div>
                    
                    <h2 class="text-4xl font-heavy italic mb-1 uppercase tracking-tighter">${p.name}</h2>
                    <div class="flex justify-center gap-2 mb-8">
                        <div class="bg-gray-800 text-[10px] font-bold px-3 py-1 rounded-full text-blue-400 border border-blue-900/50">⚔ ${titles[p.rank]}</div>
                        <div class="bg-gray-800 text-[10px] font-bold px-3 py-1 rounded-full text-gray-300 border border-gray-700">🌎 North America</div>
                    </div>

                    <div class="text-left mb-8">
                        <h4 class="text-gray-500 text-[9px] font-black uppercase tracking-[0.2em] mb-3">POSITION</h4>
                        <div class="stat-box flex items-center justify-between">
                            <div class="flex items-center gap-3">
                                <div class="bg-blue-600 text-[10px] font-black px-2 py-0.5 rounded">#${p.rank}</div>
                                <span class="text-xs font-bold uppercase italic">Overall Rank</span>
                            </div>
                            <span class="text-sm font-heavy text-blue-400">${total} <span class="text-[10px] text-gray-500">pts</span></span>
                        </div>
                    </div>

                    <div class="text-left">
                        <h4 class="text-gray-500 text-[9px] font-black uppercase tracking-[0.2em] mb-3">GAMEMODE TIERS</h4>
                        <div class="flex gap-3 overflow-x-auto no-scrollbar pb-4 -mx-2 px-2 flex-nowrap">
                            ${p.tiers.map(t => {
                                const s = getStyle(t.t);
                                return `<div class="bg-gray-800/50 p-4 rounded-2xl flex flex-col items-center min-w-[80px] border border-white/5">
                                    <div class="tier-circle !w-10 !h-10 ${s.c} mb-3"><img src="${I[t.m]}" class="w-6 h-6"></div>
                                    <span class="text-[10px] font-heavy ${s.c}">${t.t}</span>
                                    <span class="text-[8px] text-gray-500 font-bold uppercase mt-1">${t.m}</span>
                                </div>`;
                            }).join('')}
                        </div>
                    </div>
                </div>
            `;
            document.getElementById('modalOverlay').style.display = 'flex';
        }

        function closeModal() { document.getElementById('modalOverlay').style.display = 'none'; }
        render();
    </script>
</body>
</html>
