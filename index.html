<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MCTIERS - Ultimate Clone</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        body { background-color: #090e1a; font-family: 'Inter', sans-serif; color: #f8fafc; -webkit-tap-highlight-color: transparent; }
        .mctiers-card { background: #111827; border: 1px solid #1f2937; border-radius: 12px; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; }
        .mctiers-card:hover { border-color: #3b82f6; background: #161e2e; transform: translateY(-2px); }
        .mctiers-card:active { transform: scale(0.98); }
        
        /* Glow Effect for Top 3 */
        .glow-1 { box-shadow: 0 0 20px rgba(234, 179, 8, 0.15); border-color: rgba(234, 179, 8, 0.5); }
        .glow-2 { box-shadow: 0 0 20px rgba(148, 163, 184, 0.1); border-color: rgba(148, 163, 184, 0.4); }
        .glow-3 { box-shadow: 0 0 20px rgba(194, 65, 12, 0.1); border-color: rgba(194, 65, 12, 0.4); }

        .tier-tag { font-size: 10px; font-weight: 900; padding: 2px 8px; border-radius: 4px; text-transform: uppercase; margin-top: -12px; z-index: 10; border: 1px solid rgba(0,0,0,0.3); }
        .tier-circle { width: 42px; height: 42px; border-radius: 50%; display: flex; align-items: center; justify-content: center; background: #0f172a; border: 2px solid #1e293b; flex-shrink: 0; position: relative; }
        .tier-img { width: 26px; height: 26px; object-fit: contain; image-rendering: pixelated; }

        /* Tier Colors */
        .t-1 { border-color: #fbbf24; color: #fbbf24; } .bg-t-1 { background-color: #fbbf24; color: #000; }
        .t-2 { border-color: #cbd5e1; color: #cbd5e1; } .bg-t-2 { background-color: #cbd5e1; color: #000; }
        .t-3 { border-color: #ea580c; color: #ea580c; } .bg-t-3 { background-color: #ea580c; color: #fff; }
        .t-4 { border-color: #78716c; color: #a8a29e; } .bg-t-4 { background-color: #78716c; color: #fff; }
        .t-5 { border-color: #334155; color: #94a3b8; } .bg-t-5 { background-color: #334155; color: #fff; }

        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 100; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(8px); }
        .modal-box { background: #111827; border: 1px solid #1f2937; width: 100%; max-width: 420px; border-radius: 24px; padding: 32px; position: relative; }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="p-6">

    <div class="max-w-md mx-auto">
        <header class="text-center mb-10">
            <h1 class="text-4xl font-black italic tracking-tighter text-blue-500 uppercase">MCTIERS</h1>
            <p class="text-gray-500 text-xs font-bold tracking-widest mt-1">GLOBAL COMBAT RANKINGS</p>
        </header>

        <div id="playerList" class="space-y-4"></div>
    </div>

    <div id="modalOverlay" class="modal-overlay" onclick="closeModal()">
        <div class="modal-box shadow-2xl" onclick="event.stopPropagation()">
            <button onclick="closeModal()" class="absolute top-6 right-6 text-gray-500 text-2xl font-light hover:text-white">&times;</button>
            <div id="modalContent"></div>
        </div>
    </div>

    <script>
        // CONFIG: Ubah Data di Sini
        const pointMap = { 'HT1': 60, 'LT1': 55, 'HT2': 45, 'LT2': 40, 'HT3': 35, 'LT3': 25, 'HT4': 15, 'LT4': 10, 'HT5': 5, 'LT5': 2 };
        const titles = { 1: "Combat Grandmaster", 2: "Combat Master", 3: "Combat Ace", 4: "Combat Cadet", 5: "Combat Novice" };

        // Ikon Anti-Error (Base64)
        const I = {
            sword: "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAABAAAAAQCAYAAAAf8/9hAAAAMElEQVQ4T2NkoBAwUqifYf+M4D8GAnbB55qZWRX+Gf5XwU4Z7Y2g85m884m984m8AACTMArFvA0/oAAAAABJRU5ErkJggg==",
            crystal: "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAABAAAAAQCAYAAAAf8/9hAAAAZ0lEQVQ4T2NkYGDgYGBgYWBgYOFgYGBgYWBgYOFgYGBgYWBgYOFgYGBgYWBgYOFgYGBgYWBgYOFgYGBgYWBgYOFgYGBgYWBgYOFgYGBgYWBgYOFgYGBgYWBgYOFgYGBgYOFgYOFgYM4AAAwMC0YFmXgPAAAAAElRU5ErkJggg==",
            mace: "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAABAAAAAQCAYAAAAf8/9hAAAAN0lEQVQ4T2NkYGBgYGTAADXvK/hnwA4F7XN55xN75xN5AAAT4QrFvA0/oAAAAABJRU5ErkJggg==",
            pot: "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAABAAAAAQCAYAAAAf8/9hAAAANElEQVQ4T2NkoBAwUqifYf9U7FDTPp9pZmbVP9X7p9C+ETRPAW9mZtX/7zS/fOIsALAtC9W8DT+iAAAAAElRU5ErkJggg==",
            helmet: "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAABAAAAAQCAYAAAAf8/9hAAAAMUlEQVQ4T2NkYGBgYGTAAKXmU36q5mdfX9U8zUxNTaX9vIWF/4X2//N//uM5nwAAsCwKxbwNP6IAAAAASUVORK52E6IA==",
            apple: "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAABAAAAAQCAYAAAAf8/9hAAAAMElEQVQ4T2NkYGBgYGTAAKXmU36q5mdfX9U8zUxNTaX9vIWF/4X2//N//uM5nwAAsCwKxbwNP6IAAAAASUVORK5ErkJggg==",
            pearl: "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAABAAAAAQCAYAAAAf8/9hAAAAM0lEQVQ4T2NkYGBgYGTAAKXmU36q5mdfX9U8zUxNTaX9vIWF/4X2//N//uM5nwAAsCwKxbwNP6IAAAAASUVORK5ErkJggg=="
        };

        const players = [
            { name: "ItzRealMe", rank: 1, tiers: { sword: "HT3", apple: "HT1", mace: "HT1", pot: "HT1", helmet: "HT1", pearl: "HT1" } },
            { name: "coldified", rank: 2, tiers: { sword: "LT1", crystal: "HT2", mace: "LT1", helmet: "LT2" } },
            { name: "Swight", rank: 3, tiers: { sword: "HT1", pearl: "LT2", crystal: "LT3" } },
            { name: "janekv", rank: 4, tiers: { sword: "HT2", mace: "HT3" } },
            { name: "Kylaz", rank: 5, tiers: { pearl: "LT1", apple: "LT2" } }
        ];

        function getStyle(tier) { const n = tier.replace(/\D/g, ''); return { c: `t-${n}`, b: `bg-t-${n}` }; }
        function getPoints(pTiers) { return Object.values(pTiers).reduce((s, t) => s + (pointMap[t] || 0), 0); }

        function render() {
            const container = document.getElementById('playerList');
            players.forEach(p => {
                const total = getPoints(p.tiers);
                const card = document.createElement('div');
                card.className = `mctiers-card p-5 ${p.rank==1?'glow-1':p.rank==2?'glow-2':p.rank==3?'glow-3':''}`;
                card.onclick = () => openProfile(p);
                
                card.innerHTML = `
                    <div class="flex items-center justify-between mb-4">
                        <div class="flex items-center gap-4">
                            <span class="text-xl font-black italic text-gray-700">#${p.rank}</span>
                            <img src="https://minotar.net/helm/${p.name}/40.png" class="rounded shadow-sm">
                            <div>
                                <h3 class="font-extrabold text-lg leading-none">${p.name}</h3>
                                <span class="text-[9px] font-black text-blue-500 uppercase tracking-tighter">${titles[p.rank]}</span>
                            </div>
                        </div>
                        <div class="text-right">
                            <div class="text-sm font-black text-gray-300 font-mono">${total}</div>
                            <div class="text-[8px] text-gray-600 font-bold tracking-widest uppercase">PTS</div>
                        </div>
                    </div>
                    <div class="flex gap-3 overflow-x-auto no-scrollbar pb-1">
                        ${Object.entries(p.tiers).map(([mode, tier]) => {
                            const s = getStyle(tier);
                            return `<div class="flex flex-col items-center">
                                <div class="tier-circle ${s.c}"><img src="${I[mode]}" class="tier-img"></div>
                                <span class="tier-tag ${s.b}">${tier}</span>
                            </div>`;
                        }).join('')}
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function openProfile(p) {
            const body = document.getElementById('modalContent');
            const total = getPoints(p.tiers);
            body.innerHTML = `
                <div class="text-center">
                    <div class="relative inline-block mb-4">
                        <img src="https://minotar.net/armor/body/${p.name}/120.png" class="mx-auto">
                        <div class="absolute -bottom-2 left-1/2 -translate-x-1/2 bg-blue-600 text-[10px] font-black px-4 py-1 rounded-full shadow-lg">#${p.rank} OVERALL</div>
                    </div>
                    <h2 class="text-4xl font-black italic uppercase tracking-tighter mb-1">${p.name}</h2>
                    <p class="text-blue-500 text-xs font-bold tracking-widest mb-8 uppercase">${titles[p.rank]}</p>
                    
                    <div class="grid grid-cols-2 gap-4 mb-10 text-left">
                        <div class="bg-gray-800/30 p-4 rounded-2xl border border-white/5">
                            <span class="text-gray-500 text-[9px] font-black uppercase block mb-1">Region</span>
                            <span class="text-sm font-bold">North America</span>
                        </div>
                        <div class="bg-gray-800/30 p-4 rounded-2xl border border-white/5">
                            <span class="text-gray-500 text-[9px] font-black uppercase block mb-1">Total Points</span>
                            <span class="text-sm font-extrabold text-blue-400 font-mono">${total}</span>
                        </div>
                    </div>

                    <div class="text-left">
                        <span class="text-gray-500 text-[9px] font-black uppercase tracking-widest block mb-4">Gamemode Tiers</span>
                        <div class="grid grid-cols-3 gap-3">
                            ${Object.entries(p.tiers).map(([mode, tier]) => {
                                const s = getStyle(tier);
                                return `<div class="bg-black/40 p-3 rounded-2xl flex flex-col items-center border border-white/5">
                                    <img src="${I[mode]}" class="w-7 h-7 mb-2 opacity-80">
                                    <span class="text-[9px] font-black ${s.c}">${tier}</span>
                                    <span class="text-[8px] text-gray-600 uppercase font-bold mt-0.5">${mode}</span>
                                </div>`;
                            }).join('')}
                        </div>
                    </div>
                </div>
            `;
            document.getElementById('modalOverlay').style.display = 'flex';
        }

        function closeModal() { document.getElementById('modalOverlay').style.display = 'none'; }
        render();
    </script>
</body>
</html>
