<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dync Tierlist</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght=400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="p-4 max-w-3xl mx-auto">

    <div class="my-6">
        <h1 class="text-2xl font-black text-slate-100 tracking-tight">DYNC TIERLIST</h1>
        <p class="text-xs text-blue-400 font-medium tracking-wide mt-0.5">Player Performance & Matrix Ledger</p>
    </div>

    <div class="tab-bar flex overflow-x-auto gap-1 mb-6 no-scrollbar p-1 bg-[#131824] rounded-xl border border-[#1e2638]">
        <div class="tab-item active px-4 py-2 rounded-lg" onclick="filterBy('overall', this)">🏆 Overall</div>
        <div class="tab-item px-4 py-2 rounded-lg" onclick="filterBy('sword', this)">Sword</div>
        <div class="tab-item px-4 py-2 rounded-lg" onclick="filterBy('crystal', this)">Crystal</div>
        <div class="tab-item px-4 py-2 rounded-lg" onclick="filterBy('mace', this)">Mace</div>
        <div class="tab-item px-4 py-2 rounded-lg" onclick="filterBy('smp', this)">SMP</div>
    </div>

    <div id="playerContainer" class="space-y-2"></div>

    <div id="profileModal" class="universal-modal" onclick="closeProfile()">
        <div class="modal-box" onclick="event.stopPropagation()">
            <div id="modalBody"></div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
