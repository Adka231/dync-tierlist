<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dync Tierlist</title>
    <!-- Tailwind Framework Platform Integration -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Premium Google Font Architecture -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght=400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="antialiased min-h-screen">

    <!-- Top Glow Overlay Elements -->
    <div class="glow-radial-orb"></div>

    <!-- Main Table Shell Wrapper -->
    <div class="max-w-5xl mx-auto px-3 sm:px-6 py-8 relative z-10">
        
        <!-- Header Matrix -->
        <div class="flex flex-col md:flex-row md:items-end justify-between gap-4 mb-8">
            <div>
                <h1 class="text-3xl font-black tracking-tighter text-white uppercase sm:text-4xl">Dync Tierlist</h1>
                <p class="text-xs text-slate-400 font-medium tracking-wide mt-1">Inspired by Marlow's MCTiers PvP Matrix System</p>
            </div>
            <div class="text-xs font-bold text-slate-500 bg-slate-900/40 border border-slate-800/60 rounded-lg px-3 py-1.5 backdrop-blur-sm self-start md:self-auto">
                Server IP: <span class="text-blue-400">dyncpvp.club</span>
            </div>
        </div>

        <!-- Authentic McTiers Navigation Tab Array Container -->
        <div class="tab-scroller-wrap mb-6">
            <div class="flex items-center gap-1 p-1 bg-[#0d121f]/90 border border-slate-800/80 rounded-xl overflow-x-auto no-scrollbar backdrop-blur-md">
                <button class="tab-item active" onclick="setFilter('overall', this)">Overall</button>
                <button class="tab-item" onclick="setFilter('sword', this)">Sword</button>
                <button class="tab-item" onclick="setFilter('crystal', this)">Crystal</button>
                <button class="tab-item" onclick="setFilter('mace', this)">Mace</button>
                <button class="tab-item" onclick="setFilter('smp', this)">SMP</button>
                <button class="tab-item" onclick="setFilter('diapot', this)">Pot</button>
                <button class="tab-item" onclick="setFilter('nethpot', this)">NethPot</button>
                <button class="tab-item" onclick="setFilter('uhc', this)">UHC</button>
                <button class="tab-item" onclick="setFilter('axe', this)">Axe</button>
            </div>
        </div>

        <!-- Table View System -->
        <div class="glass-board overflow-hidden border border-slate-800/60 rounded-xl shadow-2xl">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse min-w-[600px]">
                    <thead>
                        <tr class="border-b border-slate-800/80 bg-slate-950/40 text-[11px] font-extrabold tracking-wider text-slate-400 uppercase">
                            <th class="py-4 px-4 text-center w-14">#</th>
                            <th class="py-4 px-4">Player</th>
                            <th class="py-4 px-4 text-center w-24">Region</th>
                            <th id="dynamicTableHeader" class="py-4 px-4 w-[450px]">Tiers</th>
                        </tr>
                    </thead>
                    <tbody id="leaderboardRows" class="divide-y divide-slate-800/40">
                        <!-- Dynamic JavaScript Rows Injected Here -->
                    </tbody>
                </table>
            </div>
        </div>

    </div>

    <!-- Liquid Glass Frost Overlay Modal View System -->
    <div id="profileModal" class="modal-backdrop" onclick="closeModal()">
        <div class="modal-surface" onclick="event.stopPropagation()">
            <div id="modalContent"></div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
