<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MCTIERS - Complete Server Leaderboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body { background-color: #0b1120; font-family: 'Inter', sans-serif; color: #f8fafc; padding-bottom: 80px; overflow-x: hidden; }
        .font-heavy { font-weight: 900; font-style: italic; text-transform: uppercase; }
        
        /* GUI Menu Tabs */
        .tab-item { transition: 0.2s; white-space: nowrap; flex-shrink: 0; cursor: pointer; }
        .tab-item.active { background: #1e293b; color: #3b82f6; border-bottom: 2px solid #3b82f6; }
        .tab-bar::-webkit-scrollbar { display: none; }

        /* Rank Slant */
        .rank-slant { 
            background: #2d3748; width: 75px; height: 65px; 
            clip-path: polygon(0 0, 100% 0, 75% 100%, 0% 100%);
            display: flex; align-items: center; justify-content: center; flex-shrink: 0;
        }
        .rank-1 { background: linear-gradient(135deg, #fbbf24, #d97706); color: #000; box-shadow: 0 0 15px rgba(251, 191, 36, 0.3); }
        .rank-2 { background: linear-gradient(135deg, #cbd5e1, #94a3b8); color: #000; }
        .rank-3 { background: linear-gradient(135deg, #cd7f32, #a0522d); color: #fff; }
        .rank-other { background: #1e293b; color: #64748b; }

        /* Card Layout */
        .mctiers-card { background: #151c2e; border-radius: 12px; margin-bottom: 12px; border: 1px solid #1e293b; overflow: hidden; transition: 0.2s; cursor: pointer; }
        .mctiers-card:hover { border-color: #3b82f6; transform: scale(1.01); }

        /* Tier Ikon Style (Sesuai Screenshot) */
        .tier-wrapper { display: flex; flex-direction: column; align-items: center; width: 48px; flex-shrink: 0; }
        .tier-circle { 
            width: 42px; height: 42px; border-radius: 50%; 
            background: #0f172a; border: 2.5px solid; 
            display: flex; align-items: center; justify-content: center; margin-bottom: -11px;
            font-size: 14px; font-weight: 800; color: #334155; /* Fallback text */
        }
        .tier-circle img { width: 24px; height: 24px; object-fit: contain; }
        .tier-box { 
            width: 40px; height: 21px; border-radius: 4px; border: 1.5px solid;
            display: flex; align-items: center; justify-content: center;
            font-size: 10px; font-weight: 900; color: white; z-index: 10;
        }

        /* Tier Themes */
        .t1-theme .tier-circle { border-color: #fbbf24; } .t1-theme .tier-box { background: #d97706; border-color: #fbbf24; }
        .t2-theme .tier-circle { border-color: #94a3b8; } .t2-theme .tier-box { background: #475569; border-color: #94a3b8; }
        .t3-theme .tier-circle { border-color: #f97316; } .t3-theme .tier-box { background: #c2410c; border-color: #f97316; }
        .t4-theme .tier-circle { border-color: #475569; } .t4-theme .tier-box { background: #1e293b; border-color: #475569; }

        /* Modal & Admin Panel */
        #profileModal, #adminPanel { display: none; position: fixed; inset: 0; z-index: 100; backdrop-filter: blur(10px); align-items: center; justify-content: center; padding: 20px; }
        #profileModal { background: rgba(0,0,0,0.9); }
        #adminPanel { background: #0b1120; z-index: 200; overflow-y: auto; display: none; flex-direction: column; align-items: flex-start; justify-content: flex-start; }
        
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .modal-box { background: #0f172a; border: 1px solid #1e293b; border-radius: 32px; animation: slideUp 0.3s ease-out; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="p-4">

    <div class="max-w-md mx-auto">
        <!-- Klik 5x di sini buat munculin tombol edit -->
        <h1 id="mainTitle" class="text-2xl font-heavy italic mb-4 cursor-pointer select-none tracking-tighter">MCTIERS</h1>

        <!-- GUI Menu GUI Menu Atas KEMBALI -->
        <div class="tab-bar flex overflow-x-auto gap-2 mb-6 no-scrollbar pb-1 border-b border-gray-800">
            <div class="tab-item active px-4 py-2 rounded-lg text-sm font-bold" onclick="filterBy('overall', this)">🏆 Overall</div>
            <div class="tab-item px-4 py-2 rounded-lg text-sm font-bold" onclick="filterBy('sword', this)">Sword</div>
            <div class="tab-item px-4 py-2 rounded-lg text-sm font-bold" onclick="filterBy('crystal', this)">Crystal</div>
            <div class="tab-item px-4 py-2 rounded-lg text-sm font-bold" onclick="filterBy('mace', this)">Mace</div>
            <div class="tab-item px-4 py-2 rounded-lg text-sm font-bold" onclick="filterBy('smp', this)">SMP</div>
            <div class="tab-item px-4 py-2 rounded-lg text-sm font-bold" onclick="filterBy('diapot', this)">Diapot</div>
            <div class="tab-item px-4 py-2 rounded-lg text-sm font-bold" onclick="filterBy('nethpot', this)">Nethpot</div>
            <div class="tab-item px-4 py-2 rounded-lg text-sm font-bold" onclick="filterBy('axe', this)">Axe</div>
            <div class="tab-item px-4 py-2 rounded-lg text-sm font-bold" onclick="filterBy('uhc', this)">UHC</div>
        </div>

        <!-- Daftar Pemain -->
        <div id="playerContainer"></div>
    </div>

    <!-- Modal Profil KEMBALI -->
    <div id="profileModal" onclick="closeProfile()">
        <div class="modal-box w-full max-w-sm p-8 relative" onclick="event.stopPropagation()">
            <button onclick="closeProfile()" class="absolute top-6 right-8 text-gray-500 hover:text-white">✕</button>
            <div id="modalBody"></div>
            <button onclick="closeProfile()" class="w-full mt-8 py-3 bg-gray-800 hover:bg-gray-700 rounded-xl text-xs font-bold uppercase tracking-widest text-gray-400">← Kembali</button>
        </div>
    </div>

    <!-- Tombol Edit Tersembunyi -->
    <button id="editBtn" onclick="openAdmin()" class="hidden fixed bottom-6 right-6 bg-blue-600 text-white px-5 py-3 rounded-full shadow-xl font-bold text-xs uppercase z-50">Edit Mode</button>

    <!-- Admin Panel -->
    <div id="adminPanel">
        <div class="max-w-md mx-auto w-full">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-heavy text-blue-400">Admin Editor</h2>
                <button onclick="document.getElementById('adminPanel').style.display='none'" class="text-gray-500">✕</button>
            </div>
            <textarea id="jsonInput" class="w-full h-[450px] bg-gray-900 text-green-400 font-mono text-[10px] p-4 rounded-xl border border-gray-700 outline-none mb-4 no-scrollbar"></textarea>
            <button onclick="saveChanges()" class="w-full bg-blue-600 py-4 rounded-xl font-bold uppercase mb-2">Simpan Perubahan</button>
            <p class="text-[10px] text-gray-600 text-center uppercase">Edit JSON dengan teliti (cek koma & tanda petik)</p>
        </div>
    </div>

    <script>
        const ADMIN_PASSWORD = "admin123"; // GANTI PASSWORD DI SINI
        let clickCount = 0;
        let currentFilter = 'overall';

        // Peta Fallback Huruf jika Ikon Rusak
        const fallbackLetters = { sword:'SW', crystal:'CR', mace:'MC', smp:'SM', diapot:'DP', nethpot:'NP', axe:'AX', uhc:'UH' };

        // Nama file asli kamu
        const iconFiles = {
            sword: "sword [CDB80F2]_2.png", uhc: "uhc [2EE8F6D]_2.png",
            crystal: "Crystal [328CA19]_2.png", diapot: "diapot [29E2609]_2.png",
            mace: "mace [97DCD4D]_2.png", nethpot: "nethpot [4469556]_2.png",
            smp: "smp [B1B3CCC]_2.png", axe: "axe [67BD866]_2.png"
        };

        // DATA TOP 7 KEMBALI LENGKAP
        const defaultPlayers = [
            { id: 1, name: "X1an_", rank: 1, pts: 850, title: "Combat Grandmaster", region: "AS", pfp: "https://i.postimg.cc/7G76yCM9/custom-ava-6.png", tiers: { sword: "HT3", crystal: "LT3", mace: "HT4", smp: "HT3", diapot: "HT4", nethpot: "HT4", axe: "LT3", uhc: "LT3" } },
            { id: 2, name: "coldified", rank: 2, pts: 720, title: "Sword Legend", region: "EU", pfp: "https://i.pinimg.com/736x/21/f0/26/21f026364f89d38977c012879572797e.jpg", tiers: { sword: "HT2", smp: "HT1", mace: "LT1" } },
            { id: 3, name: "Shadow", rank: 3, pts: 680, title: "Crystal Elite", region: "NA", pfp: "https://i.pravatar.cc/150?u=1", tiers: { nethpot: "HT3", crystal: "LT1", diapot: "LT2" } },
            { id: 4, name: "Vortex", rank: 4, pts: 510, title: "Versatile Duelist", region: "SEA", pfp: "https://i.pravatar.cc/150?u=2", tiers: { sword: "HT3", axe: "HT4", smp: "LT2" } },
            { id: 5, name: "Dante", rank: 5, pts: 490, title: "Mace Specialist", region: "EU", pfp: "https://i.pravatar.cc/150?u=3", tiers: { crystal: "HT2", mace: "LT2", uhc: "HT4" } },
            { id: 6, name: "Nifty", rank: 6, pts: 450, title: "Survival Pro", region: "NA", pfp: "https://i.pravatar.cc/150?u=4", tiers: { smp: "HT3", uhc: "LT1", diapot: "HT4" } },
            { id: 7, name: "Luv", rank: 7, pts: 380, title: "Rising Star", region: "SEA", pfp: "https://i.pravatar.cc/150?u=5", tiers: { sword: "LT1", nethpot: "HT4", axe: "LT2" } }
        ];

        let players = JSON.parse(localStorage.getItem('mctiers_v5_full')) || defaultPlayers;

        // Fungsi Render Ikon dengan Fallback Aman
        function getTierIconHtml(mode, tier) {
            const level = tier.replace(/\D/g, '');
            const file = iconFiles[mode];
            const fallbackHTML = fallbackLetters[mode] || '??';
            
            // Encode URL untuk menangani spasi/[ ]
            const encodedFile = encodeURIComponent(file);

            return `
            <div class="tier-wrapper t${level}-theme">
                <div class="tier-circle">
                    <img src="${encodedFile}" alt="${fallbackHTML}" onerror="this.style.display='none'; this.parentElement.innerHTML='${fallbackHTML}'">
                </div>
                <div class="tier-box">${tier}</div>
            </div>`;
        }

        // Render Daftar Utama
        function renderList(filteredPlayers) {
            const container = document.getElementById('playerContainer');
            container.innerHTML = '';
            
            // Sortir berdasarkan rank (jika filter overall) atau poin spesifik (jika filter mode)
            let sorted = [...filteredPlayers];
            if (currentFilter === 'overall') {
                sorted.sort((a, b) => a.rank - b.rank);
            } else {
                // Sederhana: tetap pakai rank default, tapi hanya tampilkan yang punya tier di mode itu
            }

            sorted.forEach(p => {
                const rankClass = p.rank <= 3 ? `rank-${p.rank}` : 'rank-other';
                const card = document.createElement('div');
                card.className = 'mctiers-card';
                card.onclick = () => openProfile(p.id); // Aktifkan klik profil

                // Tentukan tiers yang mau ditampilkan (semua jika overall, hanya satu jika difilter)
                let tiersHtml = '';
                if (currentFilter === 'overall') {
                    tiersHtml = Object.entries(p.tiers).map(([mode, tier]) => getTierIconHtml(mode, tier)).join('');
                } else if (p.tiers[currentFilter]) {
                    tiersHtml = getTierIconHtml(currentFilter, p.tiers[currentFilter]);
                }

                card.innerHTML = `
                    <div class="flex items-center">
                        <div class="rank-slant ${rankClass}">
                            <span class="text-xl font-heavy font-black">${p.rank}.</span>
                        </div>
                        <img src="${p.pfp}" class="w-12 h-12 rounded-full border-2 border-[#0b1120] object-cover -ml-4 z-10" onerror="this.src='https://i.imgur.com/8pw9fS0.png'">
                        <div class="ml-4 flex-1 pr-3">
                            <div class="flex justify-between items-center mb-0.5">
                                <h3 class="font-bold text-lg leading-tight truncate w-32">${p.name}</h3>
                                <div class="flex gap-2 items-center flex-shrink-0">
                                    <span class="text-[10px] font-black text-blue-400 bg-blue-500/10 px-2 py-0.5 rounded border border-blue-500/20">${p.pts} PTS</span>
                                    <span class="bg-red-900/20 text-red-500 text-[9px] font-black px-2 py-0.5 rounded uppercase">${p.region}</span>
                                </div>
                            </div>
                            <p class="text-[10px] text-yellow-500 font-bold italic">◆ ${p.title}</p>
                        </div>
                    </div>
                    <div class="px-5 py-4 border-t border-gray-800/30 mt-1 flex gap-3 overflow-x-auto no-scrollbar">
                        ${tiersHtml}
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // Fungsi Filter Tabs KEMBALI
        function filterBy(mode, el) {
            currentFilter = mode;
            // Update UI Tabs
            document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
            el.classList.add('active');

            // Filter Data
            let filtered = (mode === 'overall') ? players : players.filter(p => p.tiers[mode]);
            renderList(filtered);
        }

        // Fungsi Buka Profil KEMBALI
        function openProfile(playerId) {
            const p = players.find(player => player.id === playerId);
            if (!p) return;

            const modalBody = document.getElementById('modalBody');
            const tiersDetailHtml = Object.entries(p.tiers).map(([mode, tier]) => {
                const level = tier.replace(/\D/g, '');
                const encodedFile = encodeURIComponent(iconFiles[mode]);
                const fallbackHTML = fallbackLetters[mode] || '??';
                return `
                <div class="bg-white/5 p-3 rounded-xl flex flex-col items-center border border-white/5 t${level}-theme min-w-[70px]">
                    <div class="tier-circle scale-75 mb-[-5px]">
                        <img src="${encodedFile}" onerror="this.style.display='none'; this.parentElement.innerHTML='${fallbackHTML}'">
                    </div>
                    <span class="text-[10px] font-heavy text-white">${tier}</span>
                    <span class="text-[8px] text-gray-500 font-black uppercase tracking-widest">${mode}</span>
                </div>`;
            }).join('');

            modalBody.innerHTML = `
                <div class="text-center">
                    <img src="${p.pfp}" class="w-24 h-24 rounded-full mx-auto border-4 border-blue-500 object-cover mb-4 shadow-2xlOnError="this.src='https://i.imgur.com/8pw9fS0.png'">
                    <h2 class="text-3xl font-heavy italic mb-1tracking-tighter">${p.name}</h2>
                    <p class="text-yellow-500 font-bold italic mb-6 text-sm">◆ ${p.title} ◆</p>
                    
                    <div class="text-left mb-6">
                        <p class="text-[9px] font-black text-gray-500 mb-2 uppercase tracking-widest">RANK POSISI</p>
                        <div class="bg-gray-800/40 p-4 rounded-xl flex justify-between items-center border border-white/5">
                            <span class="text-xs font-bold text-gray-300 italic">Leaderboard Rank</span>
                            <span class="text-2xl font-heavy text-blue-400">#${p.rank}</span>
                        </div>
                    </div>

                    <div class="text-left">
                        <p class="text-[9px] font-black text-gray-500 mb-2 uppercase tracking-widest">GAMEMODE TIERS (${p.pts} PTS)</p>
                        <div class="grid grid-cols-4 gap-2.5">
                            ${tiersDetailHtml}
                        </div>
                    </div>
                </div>
            `;
            document.getElementById('profileModal').style.display = 'flex';
        }

        function closeProfile() { document.getElementById('profileModal').style.display = 'none'; }

        // --- Fitur Admin (Tetap Ada) ---
        document.getElementById('mainTitle').onclick = () => {
            clickCount++;
            if(clickCount === 5) {
                document.getElementById('editBtn').classList.remove('hidden');
                alert("Edit Mode Diaktifkan (Tombol muncul di pojok)");
                clickCount = 0;
            }
        };

        function openAdmin() {
            const pass = prompt("Masukkan Password Admin:");
            if(pass === ADMIN_PASSWORD) {
                document.getElementById('jsonInput').value = JSON.stringify(players, null, 4);
                document.getElementById('adminPanel').style.display = 'flex';
            } else if (pass !== null) {
                alert("Password Salah!");
            }
        }

        function saveChanges() {
            try {
                players = JSON.parse(document.getElementById('jsonInput').value);
                // Validasi sederhana: pastikan rank 1-7 ada
                players.sort((a,b) => a.rank - b.rank);
                players.forEach((p, index) => { p.id = index + 1; p.rank = index + 1; });

                localStorage.setItem('mctiers_v5_full', JSON.stringify(players));
                renderList(players);
                document.getElementById('adminPanel').style.display = 'none';
                alert("Berhasil disimpan dan diperbarui!");
            } catch (e) {
                alert("Format JSON Error! Pastikan koma dan tanda petik benar. Contoh format:\n{\n  \"name\": \"Player\"\n}");
            }
        }

        // Jalankan render awal
        renderList(players);
    </script>
</body>
</html>
