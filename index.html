<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MCTIERS RANK</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0b1120; font-family: sans-serif; }
        .bg-card { background-color: #161f32; border: 2px solid #1e293b; border-radius: 1rem; padding: 1rem; margin-bottom: 1rem; }
        .tier-circle { width: 45px; height: 45px; border-radius: 50%; border: 2px solid #334155; display: flex; align-items: center; justify-content: center; background: #0f172a; margin-bottom: 4px; }
        .tier-img { width: 28px; height: 28px; object-fit: contain; }
        .tier-label { font-size: 10px; font-weight: bold; padding: 1px 6px; border-radius: 4px; text-align: center; }
        .rank-1 { border-color: #fbbf24; box-shadow: 0 0 15px rgba(251, 191, 36, 0.3); }
        .rank-2 { border-color: #cbd5e1; }
        .rank-3 { border-color: #d97706; }
        /* Warna Tier */
        .bg-ht { background-color: #d97706; color: white; }
        .bg-lt { background-color: #475569; color: white; }
    </style>
</head>
<body class="text-white p-4">
    <div class="max-w-md mx-auto">
        <h1 class="text-2xl font-black italic text-center mb-6">MCTIERS <span class="text-blue-500">RANK</span></h1>

        <div class="bg-card rank-1">
            <div class="flex items-center gap-3 mb-4">
                <span class="bg-yellow-500 text-black px-3 py-1 font-bold italic rounded">1.</span>
                <img src="https://minotar.net/helm/ItzRealMe/32.png" class="rounded">
                <span class="text-xl font-bold">ItzRealMe</span>
            </div>
            <div class="flex flex-wrap gap-3 justify-center">
                <div class="flex flex-col items-center">
                    <div class="tier-circle"><img src="https://minecraft.wiki/images/Diamond_Sword_JE3_BE3.png" class="tier-img"></div>
                    <span class="tier-label bg-ht">HT3</span>
                </div>
                <div class="flex flex-col items-center">
                    <div class="tier-circle"><img src="https://minecraft.wiki/images/End_Crystal_JE2_BE2.png" class="tier-img"></div>
                    <span class="tier-label bg-ht">HT1</span>
                </div>
                <div class="flex flex-col items-center">
                    <div class="tier-circle"><img src="https://minecraft.wiki/images/Mace_JE1_BE1.png" class="tier-img"></div>
                    <span class="tier-label bg-ht">HT1</span>
                </div>
                <div class="flex flex-col items-center">
                    <div class="tier-circle"><img src="https://minecraft.wiki/images/Splash_Potion_of_Healing_JE2_BE2.png" class="tier-img"></div>
                    <span class="tier-label bg-ht">HT1</span>
                </div>
                <div class="flex flex-col items-center">
                    <div class="tier-circle"><img src="https://minecraft.wiki/images/Netherite_Helmet_JE2_BE2.png" class="tier-img"></div>
                    <span class="tier-label bg-ht">HT1</span>
                </div>
                <div class="flex flex-col items-center">
                    <div class="tier-circle"><img src="https://minecraft.wiki/images/Ender_Pearl_JE3_BE2.png" class="tier-img"></div>
                    <span class="tier-label bg-ht">HT1</span>
                </div>
            </div>
        </div>

        <div class="bg-card rank-2">
            <div class="flex items-center gap-3 mb-4">
                <span class="bg-slate-300 text-black px-3 py-1 font-bold italic rounded">2.</span>
                <img src="https://minotar.net/helm/coldified/32.png" class="rounded">
                <span class="text-xl font-bold">coldified</span>
            </div>
            <div class="flex flex-wrap gap-3 justify-center">
                <div class="flex flex-col items-center">
                    <div class="tier-circle"><img src="https://minecraft.wiki/images/Diamond_Sword_JE3_BE3.png" class="tier-img"></div>
                    <span class="tier-label bg-lt">LT1</span>
                </div>
                <div class="flex flex-col items-center">
                    <div class="tier-circle"><img src="https://minecraft.wiki/images/End_Crystal_JE2_BE2.png" class="tier-img"></div>
                    <span class="tier-label bg-ht">HT2</span>
                </div>
                <div class="flex flex-col items-center">
                    <div class="tier-circle"><img src="https://minecraft.wiki/images/Mace_JE1_BE1.png" class="tier-img"></div>
                    <span class="tier-label bg-lt">LT1</span>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
